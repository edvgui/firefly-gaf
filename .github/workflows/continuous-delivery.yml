name: Build and Push Image
on: [push]

jobs:
  build:
    name: Build and push image
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Enable images push
        if: startsWith(github.ref, 'refs/heads/master')
        run: echo "PUSH=true" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Authenticate to Docker Hub registry
        uses: docker/login-action@v4
        with:
          registry: docker.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.DOCKER_PASS }}

      - name: Authenticate to Github Container registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Install cosign
        if: env.PUSH == 'true'
        uses: sigstore/cosign-installer@v3

      - name: Build and push the images
        run: |
          make REGISTRY=docker.io IMAGE=${{ github.repository }} METADATA_FILE=metadata-docker.io.json build-multi-platform
          make REGISTRY=ghcr.io IMAGE=${{ github.repository }} METADATA_FILE=metadata-ghcr.io.json build-multi-platform

      - name: Sign the images
        if: env.PUSH == 'true'
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
        run: |
          for registry in docker.io ghcr.io; do
            image="$registry/${{ github.repository }}@$(jq -r '."containerimage.digest"' metadata-$registry.json)"

            # Keyless signature: binds the image to this workflow's identity,
            # recorded in the public Rekor transparency log
            cosign sign --yes "$image"

            # Key-based signature: verifiable with this repository's cosign.pub
            cosign sign --yes --key env://COSIGN_PRIVATE_KEY "$image"
          done
